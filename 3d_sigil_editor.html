<!DOCTYPE html>
<html lang="en">
<head>
<meta property="og:type" content="website">
  <meta property="og:title" content="3D Sigil Generator">
  <meta property="og:description" content="Build and export custom 3D sigils in the browser.">
  <meta property="og:url" content="https://sinefyre.github.io/poieticweb">
  <meta property="og:image" content="https://sinefyre.github.io/poieticweb/preview.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="3D  Sigil Generator">
  <meta name="twitter:description" content="Build and export custom 3D sigils in the browser.">
  <meta name="twitter:image" content="https://sinefyre.github.io/poieticweb/preview.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sigil Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0812;overflow:hidden}
#wrap{display:flex;height:100vh;font-family:system-ui,sans-serif}
#cv-wrap{flex:1;position:relative;overflow:hidden}
#bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;pointer-events:none;z-index:0}
#cv-wrap canvas{display:block;width:100%!important;height:100%!important;position:relative;z-index:1}
#panel{width:304px;flex-shrink:0;background:#0f0c1a;border-left:0.5px solid #2a2040;overflow-y:auto;overflow-x:hidden;scrollbar-gutter:stable;background-clip:padding-box;padding:10px 16px 10px 10px;display:flex;flex-direction:column;gap:7px}
h4{font-size:9px;font-weight:600;color:#5a5080;text-transform:uppercase;letter-spacing:.1em;margin:4px 0 2px}
.row{display:grid;grid-template-columns:60px minmax(0,1fr) 36px;align-items:center;gap:6px}
.row>:nth-child(2):last-child{grid-column:2 / 4}
label{font-size:10px;color:#8070a0;min-width:0}
input[type=range]{width:100%;min-width:0;height:2px;accent-color:#8b5cf6;cursor:pointer}
.v{font-size:10px;font-weight:500;color:#c0b0e0;min-width:36px;text-align:right;justify-self:end}
select{width:100%;min-width:0;font-size:10px;padding:2px 3px;background:#1a1530;border:0.5px solid #3a2d60;border-radius:3px;color:#c0b0e0}
.srow{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.sw{width:15px;height:15px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;flex-shrink:0}
.sw.on{border-color:#e0d0ff}
.sw-plus{width:15px;height:15px;border-radius:50%;border:1px solid #4a3a70;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sw-plus:hover{border-color:#9070c0}
.sw-plus svg{width:9px;height:9px;stroke:#8060b0;stroke-width:2;fill:none}
.sw-plus:hover svg{stroke:#c0a0e0}
.hex-pop{position:fixed;z-index:300;background:#1e1835;border:0.5px solid #4a3a70;border-radius:6px;padding:7px 8px;display:flex;align-items:center;gap:5px;box-shadow:0 4px 20px #00000099}
.hex-pop input[type=text]{width:72px;font-size:10px;padding:3px 5px;background:#0f0c1a;border:0.5px solid #4a3a70;border-radius:3px;color:#c0b0e0;font-family:monospace}
.hex-pop input[type=color]{width:22px;height:22px;padding:0;border:none;background:none;cursor:pointer;border-radius:3px;flex-shrink:0}
.hex-pop-ok{font-size:10px;padding:3px 7px;border:0.5px solid #4a3a70;border-radius:3px;background:#2a1e50;color:#c0b0e0;cursor:pointer}
.hex-pop-ok:hover{background:#3a2860}
.shell-card{background:#150f28;border:0.5px solid #2a2040;border-radius:5px;padding:6px;display:flex;flex-direction:column;gap:4px}
.sh-hdr{display:flex;align-items:center;gap:5px}
.sh-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sh-lbl{font-size:10px;font-weight:500;flex-shrink:0}
.del{background:none;border:none;color:#4a3a60;cursor:pointer;font-size:11px;padding:0;margin-left:auto}
.del:hover{color:#e24b4a}
.finish-row{display:flex;gap:3px;flex:1}
.fb{flex:1;font-size:9px;padding:3px 2px;border:0.5px solid #3a2d60;border-radius:3px;background:#1a1530;color:#7060a0;cursor:pointer;text-align:center}
.fb.on{background:#2a1e50;color:#d0c0f0;border-color:#6050a0}
.fb:hover{background:#251e40}
.light-row{display:grid;grid-template-columns:28px 52px minmax(0,1fr) 36px;align-items:center;gap:6px}
.ltog{width:28px;height:14px;border-radius:7px;background:#1a1530;border:0.5px solid #3a2d60;cursor:pointer;position:relative;flex-shrink:0;transition:background .15s}
.ltog.on{background:#3a2860;border-color:#6050a0}
.ltog::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#5a4a80;transition:left .15s,background .15s}
.ltog.on::after{left:16px;background:#c0a0f0}
.add-btn{font-size:10px;padding:4px;border:0.5px dashed #3a2d60;border-radius:4px;background:none;cursor:pointer;color:#6050a0;width:100%}
.add-btn:hover{background:#150f28}
.btn-row{display:flex;gap:5px;margin-top:2px}
.btn{flex:1;font-size:10px;padding:5px 4px;border:0.5px solid #3a2d60;border-radius:4px;background:#1a1530;color:#c0b0e0;cursor:pointer}
.btn:hover{background:#251e40}
.bg-upload-row{display:flex;gap:5px;align-items:center}
.bg-fname{font-size:9px;color:#5a4a80;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.divider{height:0.5px;background:#1e1835}
.hint{font-size:9px;color:#4a3a70;text-align:center;margin-top:2px}
@media (max-width:900px){#panel{width:280px;padding-right:14px}}
</style>
</head>
<body>
<div id="wrap">
<div id="cv-wrap">
  <img id="bg-img" alt="">
  <canvas id="c"></canvas>
</div>
<div id="panel">
  <h4>Scene</h4>
  <div class="row"><label>auto-rotate</label><input type="range" id="autorot" min="0" max="3" step="0.01" value="0.4"><span class="v" id="v-autorot">0.40</span></div>
  <div class="row"><label>bg color</label><div class="srow" id="bg-sw"></div></div>
  <div class="bg-upload-row">
    <button class="btn" id="btn-bg-upload" style="flex:none;padding:4px 8px">upload bg</button>
    <span class="bg-fname" id="bg-fname">no image</span>
    <button class="btn" id="btn-bg-clear" style="flex:none;padding:4px 8px;opacity:0.4" disabled>clear</button>
  </div>
  <input type="file" id="file-bg" accept="image/png,image/jpeg,image/jpg" style="display:none">
  <div class="divider"></div>
  <h4>Lighting</h4>
  <div class="light-row">
    <div class="ltog on" id="ltog-global" title="global lighting"></div>
    <label style="min-width:52px">global</label>
    <input type="range" id="l-global" min="0" max="2" step="0.05" value="1.0">
    <span class="v" id="v-l-global">1.00</span>
  </div>
  <div class="light-row">
    <div class="ltog on" id="ltog-amb" title="ambient"></div>
    <label style="min-width:52px">ambient</label>
    <input type="range" id="l-amb" min="0" max="3" step="0.05" value="1.2">
    <span class="v" id="v-l-amb">1.20</span>
  </div>
  <div class="light-row">
    <div class="ltog on" id="ltog-key" title="key light"></div>
    <label style="min-width:52px">key</label>
    <input type="range" id="l-key" min="0" max="4" step="0.05" value="1.0">
    <span class="v" id="v-l-key">1.00</span>
  </div>
  <div class="light-row">
    <div class="ltog on" id="ltog-fill" title="fill light"></div>
    <label style="min-width:52px">fill</label>
    <input type="range" id="l-fill" min="0" max="4" step="0.05" value="0.6">
    <span class="v" id="v-l-fill">0.60</span>
  </div>
  <div class="light-row">
    <div class="ltog on" id="ltog-rim" title="rim light"></div>
    <label style="min-width:52px">rim</label>
    <input type="range" id="l-rim" min="0" max="4" step="0.05" value="0.4">
    <span class="v" id="v-l-rim">0.40</span>
  </div>
  <div class="light-row">
    <div class="ltog on" id="ltog-env" title="env map (chrome reflection)"></div>
    <label style="min-width:52px">env / chrome</label>
    <input type="range" id="l-env" min="0" max="3" step="0.05" value="1.0">
    <span class="v" id="v-l-env">1.00</span>
  </div>
  <div class="divider"></div>
  <h4>Global</h4>
  <div class="row"><label>symmetry</label><input type="range" id="sym" min="2" max="20" step="1" value="8"><span class="v" id="v-sym">8</span></div>
  <div class="row"><label>z-layers</label><input type="range" id="zlayers" min="1" max="6" step="1" value="3"><span class="v" id="v-zlayers">3</span></div>
  <div class="row"><label>z-spread</label><input type="range" id="zspread" min="0.1" max="2" step="0.05" value="0.6"><span class="v" id="v-zspread">0.60</span></div>
  <div class="row"><label>rotation</label><input type="range" id="grot" min="0" max="360" step="1" value="0"><span class="v" id="v-grot">0</span></div>
  <div class="divider"></div>
  <h4>Center</h4>
  <div class="row"><label>type</label>
    <select id="center-type">
      <option value="none">none</option>
      <option value="sphere" selected>sphere</option>
      <option value="ring">ring</option>
      <option value="cube">cube</option>
      <option value="torus">torus</option>
      <option value="octahedron">octahedron</option>
    </select>
  </div>
  <div class="row"><label>size</label><input type="range" id="csize" min="0.05" max="0.6" step="0.01" value="0.18"><span class="v" id="v-csize">0.18</span></div>
  <div class="row"><label>color</label><div class="srow" id="center-color-sw"></div></div>
  <div class="divider"></div>
  <h4>Shells</h4>
  <div id="shells-list"></div>
  <button class="add-btn" id="add-shell">+ add shell</button>
  <div class="divider"></div>
  <div class="btn-row">
    <button class="btn" id="btn-rand">random</button>
    <button class="btn" id="btn-save">save png</button>
  </div>
  <div class="btn-row">
    <button class="btn" id="btn-export">export entity</button>
    <button class="btn" id="btn-import">import entity</button>
  </div>
  <input type="file" id="file-import" accept=".json" style="display:none">
  <div class="btn-row">
    <button class="btn" id="btn-pause">pause</button>
    <button class="btn" id="btn-play" disabled style="opacity:0.4">play</button>
  </div>
  <div class="hint">drag to orbit · scroll to zoom</div>
</div>
</div>

<script src="./vendor/three.r128.min.js"></script>
<script>
const BGSW=['#0a0812','#060e18','#080f08','#140808','#0a0a0a','#12101e'];
const COLSW=['#6ba8e8','#9888f0','#4dcaa0','#e8c850','#e86050','#e0c0f0','#ffffff','#c8e060','#a870f0','#f09050','#50d0c0','#f060a0','#80d080','#e0b0f0'];
const SHELL_TYPE_FAMILIES=[
  {label:'sacred',types:['spike','diamond','star','shield','lens']},
  {label:'organic',types:['petal','leaf','talon','thorn','capsule']},
  {label:'machine / energy',types:['arc-sweep','tri-arrow','bolt','wedge','helix-fin','gear-ring','turbine','cog','stator','ratchet']}
];
const SHELL_TYPE_LEGACY=['cross3d','blade','box','cylinder','cone','pyramid'];
const TYPES3D=[...new Set([...SHELL_TYPE_FAMILIES.flatMap(group=>group.types),...SHELL_TYPE_LEGACY])];
const SHELL_RANDOM_TYPES=SHELL_TYPE_FAMILIES.flatMap(group=>group.types);
const CENTER_TYPE_FAMILIES=[
  {label:'sacred',types:['octahedron','icosahedron','dodecahedron']},
  {label:'organic',types:['seed','vesica','pearl']},
  {label:'machine / energy',types:['orb-ring','double-torus','gyroscope']}
];
const CENTER_TYPE_LEGACY=['sphere','ring','cube','torus'];
const CENTER_RANDOM_TYPES=['none',...CENTER_TYPE_FAMILIES.flatMap(group=>group.types)];
const FINISHES=['matte','gloss','chrome'];
const ALLOWED_SHELL_TYPES=new Set(TYPES3D);
const ALLOWED_CENTER_TYPES=new Set(['none',...CENTER_TYPE_FAMILIES.flatMap(group=>group.types),...CENTER_TYPE_LEGACY]);
const ALLOWED_FINISHES=new Set(FINISHES);
const DEFAULT_LIGHTS={
  global:{on:true,intensity:1.0},
  amb:{on:true,intensity:1.2},
  key:{on:true,intensity:1.0},
  fill:{on:true,intensity:0.6},
  rim:{on:true,intensity:0.4},
  env:{on:true,intensity:1.1}
};
const SECURITY_LIMITS={
  importBytes:256*1024,
  backgroundBytes:8*1024*1024,
  maxShells:12,
  maxRenderInstances:720,
  lightIntensity:{min:0,max:4},
  autorot:{min:0,max:3},
  sym:{min:2,max:20},
  zlayers:{min:1,max:6},
  zspread:{min:0.1,max:2},
  grot:{min:0,max:360},
  csize:{min:0.05,max:0.6},
  shell:{
    radius:{min:0.1,max:2.5},
    count:{min:1,max:20},
    size:{min:0.05,max:1},
    width:{min:0.01,max:0.5},
    rotation:{min:0,max:180},
    zwave:{min:0,max:1.5},
    opacity:{min:0.05,max:1},
    kikiBouba:{min:0,max:1}
  }
};

function randCol(){return COLSW[Math.floor(Math.random()*COLSW.length)];}
function randFinish(){return FINISHES[Math.floor(Math.random()*FINISHES.length)];}
function randFrom(arr){return arr[Math.floor(Math.random()*arr.length)];}
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function clamp01(v){return Math.max(0,Math.min(1,v));}
function sanitizeNumber(value,min,max,fallback){
  const num=Number(value);
  return Number.isFinite(num)?clamp(num,min,max):fallback;
}
function sanitizeInteger(value,min,max,fallback){
  const num=Number(value);
  return Number.isFinite(num)?Math.round(clamp(num,min,max)):fallback;
}
function sanitizeBoolean(value,fallback){
  return typeof value==='boolean'?value:fallback;
}
function sanitizeHexColor(value,fallback){
  return typeof value==='string'&&/^#[0-9a-fA-F]{6}$/.test(value)?value.toLowerCase():fallback;
}
function sanitizeEnum(value,allowed,fallback){
  return typeof value==='string'&&allowed.has(value)?value:fallback;
}
function cloneDefaultLights(){return JSON.parse(JSON.stringify(DEFAULT_LIGHTS));}
function mergeLights(lights){
  const merged=cloneDefaultLights();
  if(!lights||typeof lights!=='object'||Array.isArray(lights))return merged;
  Object.keys(merged).forEach(key=>{
    const input=lights[key];
    if(!input||typeof input!=='object'||Array.isArray(input))return;
    merged[key].on=sanitizeBoolean(input.on,merged[key].on);
    merged[key].intensity=sanitizeNumber(input.intensity,SECURITY_LIMITS.lightIntensity.min,SECURITY_LIMITS.lightIntensity.max,merged[key].intensity);
  });
  return merged;
}

function buildDefaultState(){
  return{
    autorot:0.4,sym:8,zlayers:3,zspread:0.6,grot:0,
    bg:'#0a0812',centerColor:'#9888f0',
    centerType:'orb-ring',csize:0.18,
    lights:cloneDefaultLights(),
    shells:[
      {type:'spike',    radius:1.2,  count:8,size:0.55,width:0.08,rotation:0,   zwave:0.3,color:'#6ba8e8',finish:'gloss',  opacity:1.0,kikiBouba:0.1},
      {type:'diamond',  radius:0.85, count:8,size:0.3, width:0.12,rotation:22.5,zwave:0.5,color:'#c8e060',finish:'matte',  opacity:1.0,kikiBouba:0.2},
      {type:'arc-sweep',radius:0.5,  count:4,size:0.2, width:0.04,rotation:10,  zwave:0.2,color:'#e0c0f0',finish:'chrome', opacity:0.85,kikiBouba:0.35},
    ]
  };
}
const DEFAULT_STATE=buildDefaultState();
function sanitizeShell(shell,index){
  const fallback=DEFAULT_STATE.shells[index%DEFAULT_STATE.shells.length];
  if(!shell||typeof shell!=='object'||Array.isArray(shell))return {...fallback};
  return{
    type:sanitizeEnum(shell.type,ALLOWED_SHELL_TYPES,fallback.type),
    radius:sanitizeNumber(shell.radius,SECURITY_LIMITS.shell.radius.min,SECURITY_LIMITS.shell.radius.max,fallback.radius),
    count:sanitizeInteger(shell.count,SECURITY_LIMITS.shell.count.min,SECURITY_LIMITS.shell.count.max,fallback.count),
    size:sanitizeNumber(shell.size,SECURITY_LIMITS.shell.size.min,SECURITY_LIMITS.shell.size.max,fallback.size),
    width:sanitizeNumber(shell.width,SECURITY_LIMITS.shell.width.min,SECURITY_LIMITS.shell.width.max,fallback.width),
    rotation:sanitizeNumber(shell.rotation,SECURITY_LIMITS.shell.rotation.min,SECURITY_LIMITS.shell.rotation.max,fallback.rotation),
    zwave:sanitizeNumber(shell.zwave,SECURITY_LIMITS.shell.zwave.min,SECURITY_LIMITS.shell.zwave.max,fallback.zwave),
    color:sanitizeHexColor(shell.color,shell.useAccent?'#c8e060':fallback.color),
    finish:sanitizeEnum(shell.finish,ALLOWED_FINISHES,fallback.finish),
    opacity:sanitizeNumber(shell.opacity,SECURITY_LIMITS.shell.opacity.min,SECURITY_LIMITS.shell.opacity.max,fallback.opacity),
    kikiBouba:sanitizeNumber(shell.kikiBouba,SECURITY_LIMITS.shell.kikiBouba.min,SECURITY_LIMITS.shell.kikiBouba.max,fallback.kikiBouba)
  };
}
function sanitizeImportedState(imported){
  if(!imported||typeof imported!=='object'||Array.isArray(imported))throw new Error('entity data must be a JSON object');
  if(!Array.isArray(imported.shells)||imported.shells.length===0)throw new Error('entity file must include at least one shell');
  return{
    autorot:sanitizeNumber(imported.autorot,SECURITY_LIMITS.autorot.min,SECURITY_LIMITS.autorot.max,DEFAULT_STATE.autorot),
    sym:sanitizeInteger(imported.sym,SECURITY_LIMITS.sym.min,SECURITY_LIMITS.sym.max,DEFAULT_STATE.sym),
    zlayers:sanitizeInteger(imported.zlayers,SECURITY_LIMITS.zlayers.min,SECURITY_LIMITS.zlayers.max,DEFAULT_STATE.zlayers),
    zspread:sanitizeNumber(imported.zspread,SECURITY_LIMITS.zspread.min,SECURITY_LIMITS.zspread.max,DEFAULT_STATE.zspread),
    grot:sanitizeNumber(imported.grot,SECURITY_LIMITS.grot.min,SECURITY_LIMITS.grot.max,DEFAULT_STATE.grot),
    bg:sanitizeHexColor(imported.bg,DEFAULT_STATE.bg),
    centerColor:sanitizeHexColor(imported.centerColor,DEFAULT_STATE.centerColor),
    centerType:sanitizeEnum(imported.centerType,ALLOWED_CENTER_TYPES,DEFAULT_STATE.centerType),
    csize:sanitizeNumber(imported.csize,SECURITY_LIMITS.csize.min,SECURITY_LIMITS.csize.max,DEFAULT_STATE.csize),
    lights:mergeLights(imported.lights),
    shells:imported.shells.slice(0,SECURITY_LIMITS.maxShells).map((shell,index)=>sanitizeShell(shell,index))
  };
}

let state=buildDefaultState();

const canvas=document.getElementById('c');
const cvWrap=document.getElementById('cv-wrap');
const bgImg=document.getElementById('bg-img');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x000000,0);
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,1,0.01,100);
camera.position.set(0,0,5.5);

const ambLight=new THREE.AmbientLight(0xffffff,1.2); scene.add(ambLight);
const keyLight=new THREE.DirectionalLight(0xffffff,1.0); keyLight.position.set(3,5,4); scene.add(keyLight);
const fillLight=new THREE.DirectionalLight(0x9080ff,0.6); fillLight.position.set(-3,-2,-3); scene.add(fillLight);
const rimLight=new THREE.DirectionalLight(0xffffff,0.4); rimLight.position.set(0,-4,2); scene.add(rimLight);

let envMap=null;
let envMapTarget=null;
let bgObjectUrl=null;
function getGlobalLightFactor(){
  const globalLight=state.lights.global||DEFAULT_LIGHTS.global;
  return globalLight.on?globalLight.intensity:0;
}
function getEffectiveEnvIntensity(){
  return state.lights.env.on?state.lights.env.intensity*getGlobalLightFactor():0;
}
function hasCustomBackground(){
  return bgImg.style.display==='block'&&!!bgImg.src;
}
function createStudioEnvTexture(){
  const envCanvas=document.createElement('canvas');
  envCanvas.width=1024;
  envCanvas.height=512;
  const ctx=envCanvas.getContext('2d');

  const sky=ctx.createLinearGradient(0,0,0,envCanvas.height);
  sky.addColorStop(0,'#f5f8ff');
  sky.addColorStop(0.18,'#9fb2e8');
  sky.addColorStop(0.45,'#24314c');
  sky.addColorStop(1,'#05070b');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,envCanvas.width,envCanvas.height);

  const horizon=ctx.createLinearGradient(0,envCanvas.height*0.44,0,envCanvas.height*0.7);
  horizon.addColorStop(0,'rgba(255,255,255,0)');
  horizon.addColorStop(0.45,'rgba(250,252,255,0.28)');
  horizon.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=horizon;
  ctx.fillRect(0,envCanvas.height*0.3,envCanvas.width,envCanvas.height*0.5);

  const leftGlow=ctx.createRadialGradient(envCanvas.width*0.18,envCanvas.height*0.28,10,envCanvas.width*0.18,envCanvas.height*0.28,170);
  leftGlow.addColorStop(0,'rgba(255,255,255,0.95)');
  leftGlow.addColorStop(0.3,'rgba(188,205,255,0.42)');
  leftGlow.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=leftGlow;
  ctx.fillRect(0,0,envCanvas.width,envCanvas.height);

function buildEnvMap(){

  const envTexture=createStudioEnvTexture();
  if(envMapTarget)envMapTarget.dispose();
  envMapTarget=pmrem.fromEquirectangular(envTexture);
  envTexture.dispose();

function hexToThree(hex){return new THREE.Color(hex);}

function makeMat(hex,finish,opacity){
  finish=finish||'gloss';
  opacity=opacity===undefined?1:opacity;
  const col=hexToThree(hex);
  const transparent=opacity<0.99;
  const common={opacity,transparent,depthWrite:!transparent,side:THREE.DoubleSide};
  if(finish==='chrome'){
    const m=new THREE.MeshStandardMaterial({...common,color:col,metalness:1.0,roughness:0.05,envMapIntensity:getEffectiveEnvIntensity()});
    if(envMap&&state.lights.env.on)m.envMap=envMap;
    return m;
  } else if(finish==='gloss'){
    return new THREE.MeshPhongMaterial({...common,color:col,shininess:200,specular:new THREE.Color(0xffffff)});
  } else {
    return new THREE.MeshLambertMaterial({...common,color:col});
  }
}

function lerp(a,b,t){return a+(b-a)*t;}

function formatTypeLabel(type){return type.replace(/-/g,' ');}
function buildGroupedSelect(select,families,legacy,currentValue){
  const known=new Set();
  families.forEach(group=>{
    const optGroup=document.createElement('optgroup');
    optGroup.label=group.label;
    group.types.forEach(type=>{
      known.add(type);
      const option=document.createElement('option');
      option.value=type;
      option.textContent=formatTypeLabel(type);
      if(type===currentValue)option.selected=true;
      optGroup.appendChild(option);
    });
    select.appendChild(optGroup);
  });
  if(legacy&&legacy.length){
    const optGroup=document.createElement('optgroup');
    optGroup.label='legacy / hybrid';
    legacy.forEach(type=>{
      known.add(type);
      const option=document.createElement('option');
      option.value=type;
      option.textContent=formatTypeLabel(type);
      if(type===currentValue)option.selected=true;
      optGroup.appendChild(option);
    });
    select.appendChild(optGroup);
  }
  if(currentValue&&!known.has(currentValue)){
    const optGroup=document.createElement('optgroup');
    optGroup.label='imported';
    const option=document.createElement('option');
    option.value=currentValue;
    option.textContent=formatTypeLabel(currentValue);
    option.selected=true;
    optGroup.appendChild(option);
    select.appendChild(optGroup);
  }
}

function makeShape2D(pts,closed=true){
  const s=new THREE.Shape();
  s.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)s.lineTo(pts[i][0],pts[i][1]);
  if(closed)s.closePath();
  return new THREE.ShapeGeometry(s);
}

function makeShapeWithCircularHole(outerPts,holeR,holeSegments=40){
  const s=new THREE.Shape();
  s.moveTo(outerPts[0][0],outerPts[0][1]);
  for(let i=1;i<outerPts.length;i++)s.lineTo(outerPts[i][0],outerPts[i][1]);
  s.closePath();
  if(holeR>0){
    const hole=new THREE.Path();
    hole.absarc(0,0,holeR,0,Math.PI*2,true);
    s.holes.push(hole);
  }
  return new THREE.ShapeGeometry(s,holeSegments);
}

function makeRadialPts(radiusFn,segments,startAngle=-Math.PI/2){
  const pts=[];
  const TAU=Math.PI*2;
  for(let i=0;i<segments;i++){
    const a=startAngle+i*TAU/segments;
    const r=Math.max(0.001,radiusFn(a,i/segments));
    pts.push([Math.cos(a)*r,Math.sin(a)*r]);
  }
  return pts;
}

function makeGearOutline(toothCount,rootR,tipR,tipBias=0.5,sawBias=0){
  const pts=[];
  const TAU=Math.PI*2;
  for(let i=0;i<toothCount;i++){
    const a0=-Math.PI/2+i*TAU/toothCount;
    const a1=a0+TAU/toothCount*(0.14+Math.max(0,-sawBias)*0.08);
    const a2=a0+TAU/toothCount*(0.36+tipBias*0.12+sawBias*0.12);
    const a3=a0+TAU/toothCount*(0.64+tipBias*0.12+sawBias*0.06);
    const a4=a0+TAU/toothCount*(0.86+Math.max(0,sawBias)*0.08);
    pts.push(
      [Math.cos(a0)*rootR,Math.sin(a0)*rootR],
      [Math.cos(a1)*tipR,Math.sin(a1)*tipR],
      [Math.cos(a2)*tipR,Math.sin(a2)*tipR],
      [Math.cos(a3)*tipR,Math.sin(a3)*tipR],
      [Math.cos(a4)*rootR,Math.sin(a4)*rootR]
    );
  }
  return pts;
}

function makeCurvedShape2D(fn,nPts=48){
  const s=new THREE.Shape();
  const p0=fn(0);s.moveTo(p0[0],p0[1]);
  for(let i=1;i<=nPts;i++){const p=fn(i/nPts);s.lineTo(p[0],p[1]);}
  return new THREE.ShapeGeometry(s);
}

      s.moveTo(arc1[0][0],arc1[0][1]);
      arc1.forEach(p=>s.lineTo(p[0],p[1]));
      for(let i=nPts;i>=0;i--){
        const a=startA+i*(2*halfAngle)/nPts;
        s.lineTo(-Math.cos(a)*r,Math.sin(a)*r);
      }
      s.closePath();
      return new THREE.ShapeGeometry(s);
    }

    case 'wedge':{
      const h=size*0.7;
      const wTop=lerp(0,width*0.3,b);
      const wBot=lerp(width*0.85,width*0.65,b);
      const lean=lerp(width*0.35,0,b);
      const s=new THREE.Shape();
      s.moveTo(-wTop*0.5,-h);
      s.bezierCurveTo(lerp(-wTop*0.3,wTop*0.1,b),-h*0.5,lean+wBot*0.5,lerp(0,h*0.1,b),lean+wBot*0.5,h);
      s.bezierCurveTo(lean,h+lerp(0,width*0.15,b),-lean*0.3,h+lerp(0,width*0.15,b),-lean+wBot*-0.5,h);
      s.bezierCurveTo(-lean-wBot*0.5,lerp(0,h*0.1,b),lerp(wTop*0.3,-wTop*0.1,b),-h*0.5,-wTop*0.5,-h);
      s.closePath();
      return new THREE.ShapeGeometry(s);
    }

    case 'box':{
      const W=lerp(width,width*1.1,b);
      const H=lerp(size,size*0.92,b);
      const D=lerp(W*0.6,W*0.7,b);
      const segs=lerp(1,6,b)|0;
      return new THREE.BoxGeometry(W,H,D,segs,segs,segs);
    }

    case 'cylinder':{
      const radTop=lerp(width*0.3,width*0.42,b);
      const radBot=lerp(width*0.5,width*0.42,b);
      const H=lerp(size,size*0.92,b);
      const segs=lerp(8,20,b)|0;
      return new THREE.CylinderGeometry(radTop,radBot,H,segs);
    }

    case 'cone':{
      const rad=lerp(width*0.5,width*0.55,b);
      const H=lerp(size,size*0.82,b);
      const segs=lerp(7,20,b)|0;
      return new THREE.ConeGeometry(rad,H,segs);
    }

    case 'pyramid':{
      const rad=lerp(width*0.45,width*0.52,b);
      const H=lerp(size,size*0.82,b);
      const segs=lerp(4,12,b)|0;
      return new THREE.ConeGeometry(rad,H,segs);
    }

    case 'thorn':{
      const rad=lerp(width*0.15,width*0.32,b);
      const H=lerp(size,size*0.78,b);
      const segs=lerp(5,16,b)|0;
      return new THREE.ConeGeometry(rad,H,segs);
    }

    case 'capsule':{
      const rad=lerp(width*0.28,width*0.38,b);
      const H=lerp(size*0.85,size*0.7,b);
      const segs=lerp(6,18,b)|0;
      return THREE.CapsuleGeometry
        ? new THREE.CapsuleGeometry(rad,H,4,segs)
        : new THREE.CylinderGeometry(rad,rad,H,Math.max(6,segs),1,false);
    }

    case 'helix-fin':{
      const h=size;const w=width*0.65;
      const twist=lerp(0,Math.PI*0.55,b);
      const pts=[];
      const nPts=24;
      for(let i=0;i<=nPts;i++){
        const t=i/nPts;
        const y=lerp(-h*0.5,h*0.5,t);
        const a=lerp(-0.6,0.6,t)+twist*t;
        pts.push([Math.cos(a)*w,y]);
      }
      for(let i=nPts;i>=0;i--){
        const t=i/nPts;
        const y=lerp(-h*0.5,h*0.5,t);
        const a=lerp(-0.6,0.6,t)+twist*t;
        pts.push([Math.cos(a)*w*lerp(0.1,0.5,b),y]);
      }
      return makeShape2D(pts,true);
    }

    case 'gear-ring':{
      const outerR=size*0.56;
      const rootR=Math.max(outerR*0.58,outerR-lerp(width*1.15,width*0.6,b));
      const holeR=outerR*lerp(0.26,0.4,b);
      const teeth=lerp(8,12,b)|0;
      const pts=makeGearOutline(teeth,rootR,outerR,lerp(0.32,0.62,b),0);
      return makeShapeWithCircularHole(pts,holeR,48);
    }

    case 'turbine':{
      const outerR=size*0.55;
      const innerR=outerR*lerp(0.42,0.58,b);
      const blades=lerp(5,8,b)|0;
      const twist=lerp(0.35,1.0,b);
      const pts=makeRadialPts((a)=>{
        const wave=0.5+0.5*Math.sin(blades*a+twist*Math.sin(a*2));
        return lerp(innerR,outerR,Math.pow(wave,lerp(1.5,0.85,b)));
      },Math.max(48,blades*20));
      return makeShapeWithCircularHole(pts,outerR*0.24,48);
    }

    case 'cog':{
      const outerR=size*0.56;
      const rootR=Math.max(outerR*0.52,outerR-lerp(width*1.2,width*0.55,b));
      const teeth=lerp(7,11,b)|0;
      const pts=makeGearOutline(teeth,rootR,outerR,lerp(0.22,0.5,b),0);
      return makeShape2D(pts);
    }

    case 'stator':{
      const outerR=size*0.58;
      const rootR=Math.max(outerR*0.72,outerR-lerp(width*0.75,width*0.38,b));
      const holeR=outerR*lerp(0.36,0.5,b);
      const poles=lerp(6,9,b)|0;
      const pts=makeGearOutline(poles,rootR,outerR,lerp(0.55,0.8,b),0);
      return makeShapeWithCircularHole(pts,holeR,48);
    }

    case 'ratchet':{
      const outerR=size*0.56;
      const rootR=Math.max(outerR*0.56,outerR-lerp(width*1.1,width*0.55,b));
      const holeR=outerR*lerp(0.16,0.26,b);
      const teeth=lerp(7,10,b)|0;
      const pts=makeGearOutline(teeth,rootR,outerR,lerp(0.24,0.4,b),lerp(0.12,0.28,b));
      return makeShapeWithCircularHole(pts,holeR,48);
    }

    default:
      return new THREE.SphereGeometry(width*0.3,12,12);
  }
}

function applyLights(){
  const L=state.lights;
  const globalFactor=getGlobalLightFactor();
  ambLight.intensity=L.amb.on?L.amb.intensity*globalFactor:0;
  keyLight.intensity=L.key.on?L.key.intensity*globalFactor:0;
  fillLight.intensity=L.fill.on?L.fill.intensity*globalFactor:0;
  rimLight.intensity=L.rim.on?L.rim.intensity*globalFactor:0;
  scene.environment=L.env.on&&globalFactor>0?envMap:null;
  if(typeof scene.environmentIntensity!=='undefined')scene.environmentIntensity=getEffectiveEnvIntensity();
}

function disposeRenderable(obj){
  obj.traverse(child=>{
    if(child.geometry)child.geometry.dispose();
    if(child.material){
      const mats=Array.isArray(child.material)?child.material:[child.material];
      mats.forEach(mat=>{if(mat)mat.dispose();});
    }
  });
}

function buildSigil(){
  while(sigilGroup.children.length>0){
    const c=sigilGroup.children[0];
    disposeRenderable(c);
    sigilGroup.remove(c);
  }
  const sym=sanitizeInteger(state.sym,SECURITY_LIMITS.sym.min,SECURITY_LIMITS.sym.max,DEFAULT_STATE.sym);
  const grot=sanitizeNumber(state.grot,SECURITY_LIMITS.grot.min,SECURITY_LIMITS.grot.max,DEFAULT_STATE.grot);
  const zlayers=sanitizeInteger(state.zlayers,SECURITY_LIMITS.zlayers.min,SECURITY_LIMITS.zlayers.max,DEFAULT_STATE.zlayers);
  const zspread=sanitizeNumber(state.zspread,SECURITY_LIMITS.zspread.min,SECURITY_LIMITS.zspread.max,DEFAULT_STATE.zspread);
  const centerType=sanitizeEnum(state.centerType,ALLOWED_CENTER_TYPES,DEFAULT_STATE.centerType);
  const csize=sanitizeNumber(state.csize,SECURITY_LIMITS.csize.min,SECURITY_LIMITS.csize.max,DEFAULT_STATE.csize);
  const centerColor=sanitizeHexColor(state.centerColor,DEFAULT_STATE.centerColor);
  const shells=(Array.isArray(state.shells)?state.shells:DEFAULT_STATE.shells)
    .slice(0,SECURITY_LIMITS.maxShells)
    .map((shell,index)=>sanitizeShell(shell,index));
  const baseAngle=grot*Math.PI/180;
  const TAU=Math.PI*2;
  const is3DGeoTypes=['box','cylinder','cone','pyramid','thorn','capsule'];
  let renderCount=0;

  outer: for(const sh of shells){
    const col=sh.color||'#ffffff';
    const finish=sh.finish||'gloss';
    const baseOpacity=sh.opacity===undefined?1:sh.opacity;
    const is3DGeo=is3DGeoTypes.includes(sh.type);
    const zwave=sh.zwave||0;
    const shellRot=(sh.rotation||0)*Math.PI/180;
    for(let z=0;z<zlayers;z++){
      const zOff=(z-(zlayers-1)/2)*zspread;
      const zRot=z*0.18;
      for(let s=0;s<sym;s++){
        if(renderCount>=SECURITY_LIMITS.maxRenderInstances)break outer;
        const angle=baseAngle+shellRot+s*TAU/sym+zRot;
        const zBend=Math.sin(angle*2+z)*zwave*0.5;
        const ex=Math.cos(angle)*sh.radius,ey=Math.sin(angle)*sh.radius,ez=zOff+zBend;
        const layerFade=1-Math.abs(z-(zlayers-1)/2)/zlayers*0.5;
        const finalOpacity=Math.max(0.05,baseOpacity*layerFade);
        const mesh=makeElement(sh.type,sh.size,sh.width,col,finish,finalOpacity,sh.kikiBouba);
        mesh.position.set(ex,ey,ez);
        if(is3DGeo){mesh.lookAt(0,0,ez);mesh.rotateZ(angle+Math.PI/2);}
        else{mesh.rotation.z=angle+Math.PI/2;}
        sigilGroup.add(mesh);
        renderCount++;
      }
    }
  }

  if(centerType!=='none'&&renderCount<SECURITY_LIMITS.maxRenderInstances){
    sigilGroup.add(createCenterObject(centerType,csize,centerColor));
  }
}

}

  bgImg.onload=null;
  bgImg.onerror=null;
  bgImg.style.display='none';
  bgImg.removeAttribute('src');
  updateBgUi('');
  applyScene();
}

  revokeBgUrl();
  bgObjectUrl=URL.createObjectURL(file);
  bgImg.onload=()=>{
    bgImg.style.display='block';
    applyScene();
  };
  bgImg.onerror=()=>{
    clearBackground();
    alert('Could not load that image. Try a PNG or JPG.');
  };
  bgImg.src=bgObjectUrl;
  updateBgUi(file.name);
}

function drawCoverImage(ctx,img,w,h){
  const imgAspect=img.naturalWidth/img.naturalHeight;
  const outAspect=w/h;
  let drawW=w,drawH=h,offsetX=0,offsetY=0;
  if(imgAspect>outAspect){
    drawH=h;
    drawW=h*imgAspect;
    offsetX=(w-drawW)/2;
  } else {
    drawW=w;
    drawH=w/imgAspect;
    offsetY=(h-drawH)/2;
  }
  ctx.drawImage(img,offsetX,offsetY,drawW,drawH);
}

function buildExportCanvas(){
  const exportCanvas=document.createElement('canvas');
  exportCanvas.width=canvas.width;
  exportCanvas.height=canvas.height;
  const ctx=exportCanvas.getContext('2d');
  if(hasCustomBackground()&&bgImg.complete&&bgImg.naturalWidth){
    drawCoverImage(ctx,bgImg,exportCanvas.width,exportCanvas.height);
  } else {
    ctx.fillStyle=state.bg;
    ctx.fillRect(0,0,exportCanvas.width,exportCanvas.height);
  }
  ctx.drawImage(canvas,0,0,exportCanvas.width,exportCanvas.height);
  return exportCanvas;
}

let isPaused=false;
let isDragging=false,lastX=0,lastY=0,rotX=0.3,rotY=0;

window.addEventListener('mouseup',()=>isDragging=false);

  if(!isDragging)return;
  rotY+=(e.clientX-lastX)*0.008;rotX+=(e.clientY-lastY)*0.008;

});

  camera.position.z=Math.max(1.5,Math.min(12,camera.position.z+e.deltaY*0.005));

let touched=false,tx0=0,ty0=0;

cvWrap.addEventListener('touchend',()=>touched=false);
cvWrap.addEventListener('touchmove',e=>{
  if(!touched)return;
  rotY+=(e.touches[0].clientX-tx0)*0.008;rotX+=(e.touches[0].clientY-ty0)*0.008;

},{passive:true});

function buildColorPicker(container,getColor,setColor){
  container.innerHTML='';
  const cur=getColor();
  COLSW.forEach(c=>{
    const d=document.createElement('div');
    d.className='sw'+(cur===c?' on':'');
    d.style.background=c;
    d.onclick=()=>{setColor(c);buildColorPicker(container,getColor,setColor);};
    container.appendChild(d);
  });
  const plusBtn=document.createElement('div');
  plusBtn.className='sw-plus';plusBtn.title='custom color';
  plusBtn.innerHTML='<svg viewBox="0 0 10 10"><line x1="5" y1="1" x2="5" y2="9"/><line x1="1" y1="5" x2="9" y2="5"/></svg>';
  plusBtn.onclick=(e)=>{
    e.stopPropagation();closeActivePop();
    const pop=document.createElement('div');pop.className='hex-pop';
    const colorNative=document.createElement('input');colorNative.type='color';
    colorNative.value=(/^#[0-9a-fA-F]{6}$/.test(getColor()))?getColor():'#ffffff';
    const hexInput=document.createElement('input');hexInput.type='text';hexInput.value=getColor();hexInput.maxLength=7;hexInput.placeholder='#rrggbb';
    colorNative.oninput=()=>{hexInput.value=colorNative.value;};
    hexInput.oninput=()=>{const v=hexInput.value.trim();if(/^#[0-9a-fA-F]{6}$/.test(v))colorNative.value=v;};
    const ok=document.createElement('button');ok.className='hex-pop-ok';ok.textContent='ok';
    ok.onclick=()=>{const v=hexInput.value.trim();if(/^#[0-9a-fA-F]{6}$/.test(v)){setColor(v);buildColorPicker(container,getColor,setColor);}closeActivePop();};
    hexInput.onkeydown=(e)=>{if(e.key==='Enter')ok.click();if(e.key==='Escape')closeActivePop();};
    pop.appendChild(colorNative);pop.appendChild(hexInput);pop.appendChild(ok);
    const rect=plusBtn.getBoundingClientRect();
    const panelRect=document.getElementById('panel').getBoundingClientRect();
    pop.style.left=Math.min(rect.left,panelRect.right-220)+'px';
    pop.style.top=(rect.bottom+4)+'px';
    document.body.appendChild(pop);activePop=pop;
    setTimeout(()=>{hexInput.focus();hexInput.select();},10);
  };
  container.appendChild(plusBtn);
}

  ];

    tog.className='ltog'+(L.on?' on':'');

}

document.getElementById('add-shell').onclick=()=>{
  state.shells.push({type:'spike',radius:1.0,count:8,size:0.4,width:0.08,rotation:0,zwave:0.3,color:randCol(),finish:'gloss',opacity:1.0,kikiBouba:0.15});
  renderShells();buildSigil();
};

document.getElementById('btn-rand').onclick=()=>{
  state.sym=Math.floor(Math.random()*14)+3;state.grot=Math.floor(Math.random()*360);
  state.zlayers=Math.floor(Math.random()*5)+1;state.zspread=+(Math.random()*1.5+0.2).toFixed(2);
  state.autorot=+(Math.random()*2).toFixed(2);state.bg=BGSW[Math.floor(Math.random()*BGSW.length)];
  state.centerColor=randCol();state.centerType=randFrom(CENTER_RANDOM_TYPES);
  state.csize=+(Math.random()*0.4+0.1).toFixed(2);
  const n=Math.floor(Math.random()*4)+1;
  state.shells=Array.from({length:n},(_,i)=>({
    type:randFrom(SHELL_RANDOM_TYPES),
    radius:+(0.4+i*0.5+Math.random()*0.4).toFixed(2),count:Math.floor(Math.random()*12)+3,
    size:+(Math.random()*0.6+0.1).toFixed(2),width:+(Math.random()*0.2+0.03).toFixed(2),
    rotation:Math.floor(Math.random()*60),zwave:+(Math.random()*1.2).toFixed(2),
    color:randCol(),finish:randFinish(),opacity:+(Math.random()*0.5+0.5).toFixed(2),kikiBouba:+(Math.random()*0.95).toFixed(2)
  }));
  applyScene();refreshGlobalUI();renderShells();buildSigil();
};

document.getElementById('btn-save').onclick=()=>{
  renderer.render(scene,camera);
  const exportCanvas=buildExportCanvas();
  const a=document.createElement('a');a.download='sigil3d.png';a.href=exportCanvas.toDataURL('image/png');a.click();
};

document.getElementById('btn-export').onclick=()=>{
  const exportData={version:'4.0',timestamp:new Date().toISOString(),state:JSON.parse(JSON.stringify(state))};
  const blob=new Blob([JSON.stringify(exportData,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.download='sigil-entity-'+Date.now()+'.json';
  a.href=URL.createObjectURL(blob);a.click();URL.revokeObjectURL(a.href);
};

document.getElementById('btn-import').onclick=()=>{document.getElementById('file-import').click();};
document.getElementById('file-import').onchange=e=>{
  const file=e.target.files[0];if(!file)return;
  if(file.size>SECURITY_LIMITS.importBytes){
    alert('Entity file is too large. Keep imports under 256 KB.');
    e.target.value='';
    return;
  }
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      const imported=parsed.state||parsed;
      state=sanitizeImportedState(imported);
      applyScene();applyLights();refreshGlobalUI();renderShells();buildSigil();
    }catch(err){alert('Could not load entity: '+err.message);}
  };
  reader.readAsText(file);e.target.value='';
};

document.getElementById('btn-bg-upload').onclick=()=>{document.getElementById('file-bg').click();};
document.getElementById('file-bg').onchange=e=>{
  const file=e.target.files[0];if(!file)return;
  if(!/^image\/(png|jpeg)$/.test(file.type)||file.size>SECURITY_LIMITS.backgroundBytes){
    alert('Background must be a PNG or JPG under 8 MB.');
    e.target.value='';
    return;
  }
  setBackgroundFile(file);
  e.target.value='';
};
document.getElementById('btn-bg-clear').onclick=()=>{clearBackground();};

document.getElementById('btn-pause').onclick=()=>{
  isPaused=true;
  document.getElementById('btn-pause').disabled=true;document.getElementById('btn-pause').style.opacity='0.4';
  document.getElementById('btn-play').disabled=false;document.getElementById('btn-play').style.opacity='1';
};
document.getElementById('btn-play').onclick=()=>{
  isPaused=false;
  document.getElementById('btn-play').disabled=true;document.getElementById('btn-play').style.opacity='0.4';
  document.getElementById('btn-pause').disabled=false;document.getElementById('btn-pause').style.opacity='1';
};

buildEnvMap();
applyScene();
applyLights();
setupGlobal();
setupLights();
renderShells();
buildSigil();
animate();

window.addEventListener('beforeunload',()=>{
  revokeBgUrl();
  if(envMapTarget)envMapTarget.dispose();
});
</script>
</body>
</html>
